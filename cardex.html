<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cardex">
<title>Cardex</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg-primary:#ffffff; --bg-secondary:#f5f5f4; --bg-tertiary:#eeede9;
    --text-primary:#1a1917; --text-secondary:#6b6a67; --text-tertiary:#a09e9a;
    --border-light:rgba(0,0,0,0.1); --border-mid:rgba(0,0,0,0.18); --border-strong:rgba(0,0,0,0.28);
    --radius-md:8px; --radius-lg:12px; --radius-xl:20px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg-primary:#1e1e1c; --bg-secondary:#2a2a28; --bg-tertiary:#141412;
      --text-primary:#f0eeea; --text-secondary:#9e9c98; --text-tertiary:#6a6865;
      --border-light:rgba(255,255,255,0.08); --border-mid:rgba(255,255,255,0.14); --border-strong:rgba(255,255,255,0.22);
    }
  }
  body { font-family:var(--font); background:var(--bg-tertiary); color:var(--text-primary); min-height:100vh; }
  #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  /* Topbar — two rows */
  .topbar { background:var(--bg-primary); border-bottom:0.5px solid var(--border-light); padding:12px 16px 10px; display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
  .topbar-row1 { display:flex; align-items:center; gap:10px; }
  .topbar-row2 { display:flex; align-items:center; gap:8px; }
  .topbar h1 { font-size:17px; font-weight:600; color:var(--text-primary); letter-spacing:-0.4px; white-space:nowrap; }
  .topbar-input-wrap { flex:1; position:relative; }
  .topbar-input-wrap input { width:100%; padding:13px 90px 13px 16px; border:0.5px solid var(--border-mid); border-radius:var(--radius-lg); font-size:16px; background:var(--bg-secondary); color:var(--text-primary); outline:none; font-family:var(--font); }
  .topbar-input-wrap input:focus { border-color:var(--border-strong); background:var(--bg-primary); }
  .topbar-input-wrap input::placeholder { color:var(--text-tertiary); }
  .topbar-input-wrap button { position:absolute; right:6px; top:50%; transform:translateY(-50%); padding:8px 16px; font-size:14px; font-weight:600; background:var(--text-primary); color:var(--bg-primary); border:none; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); transition:opacity 0.15s; }
  .topbar-input-wrap button:hover { opacity:0.85; }
  .topbar-input-wrap button:disabled { opacity:0.35; cursor:not-allowed; }
  .topbar-btn { padding:8px 14px; font-size:13px; font-weight:500; border:0.5px solid var(--border-mid); background:var(--bg-secondary); color:var(--text-secondary); border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); white-space:nowrap; transition:all 0.15s; flex-shrink:0; }
  .topbar-btn:hover { color:var(--text-primary); border-color:var(--border-strong); }
  .topbar-btn.danger { color:#c23030; border-color:rgba(194,48,48,0.35); background:rgba(194,48,48,0.06); }
  .topbar-btn.danger:hover { background:rgba(194,48,48,0.12); }

  /* Nav */
  .nav-tabs { background:var(--bg-primary); border-bottom:0.5px solid var(--border-light); padding:0 20px; display:flex; gap:2px; flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
  .nav-tabs::-webkit-scrollbar { display:none; }
  .nav-tab { padding:10px 14px; font-size:13px; cursor:pointer; color:var(--text-secondary); border-bottom:2px solid transparent; transition:color 0.15s; white-space:nowrap; user-select:none; }
  .nav-tab.active { color:var(--text-primary); border-bottom-color:var(--text-primary); font-weight:500; }
  .nav-tab:hover:not(.active) { color:var(--text-primary); }

  /* Delete mode banner */
  .delete-mode-bar { background:#FEF2F2; border-bottom:0.5px solid rgba(194,48,48,0.2); padding:9px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; font-size:13px; color:#c23030; }
  .delete-mode-bar.hidden { display:none; }
  .delete-mode-count { font-weight:500; }
  .delete-mode-actions { margin-left:auto; display:flex; gap:8px; }
  .dmode-btn { padding:5px 12px; font-size:12px; font-weight:500; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); border:none; transition:all 0.15s; }
  .dmode-btn.confirm { background:#c23030; color:white; }
  .dmode-btn.confirm:hover { background:#a01f1f; }
  .dmode-btn.confirm:disabled { opacity:0.4; cursor:not-allowed; }
  .dmode-btn.cancel { background:var(--bg-secondary); color:var(--text-secondary); border:0.5px solid var(--border-mid); }
  .dmode-btn.cancel:hover { color:var(--text-primary); }

  /* Main */
  .main { flex:1; overflow:auto; padding:20px; }
  .search-bar { margin-bottom:16px; }
  .search-bar input { width:100%; padding:8px 14px; border:0.5px solid var(--border-light); border-radius:var(--radius-lg); font-size:13px; background:var(--bg-primary); color:var(--text-primary); outline:none; font-family:var(--font); }
  .search-bar input:focus { border-color:var(--border-mid); }
  .search-bar input::placeholder { color:var(--text-tertiary); }

  /* Cards */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
  .card { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-lg); cursor:pointer; transition:border-color 0.15s,transform 0.12s,box-shadow 0.15s; position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .card:hover { border-color:var(--border-mid); transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.1); }
  .card.selected { border-color:#c23030; box-shadow:0 0 0 2px rgba(194,48,48,0.2); transform:none; }
  .card-img-wrap { width:100%; height:130px; overflow:hidden; position:relative; background:var(--bg-secondary); flex-shrink:0; }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .card-img-wrap .img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:36px; }
  .card-img-accent { position:absolute; bottom:0; left:0; right:0; height:3px; }

  /* Quick-delete X button on card */
  .card-delete-btn { position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,0.5); border:none; color:white; font-size:11px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:10; transition:background 0.12s; }
  .card-delete-btn:hover { background:rgba(194,48,48,0.85); }
  .card:hover .card-delete-btn { display:flex; }
  .delete-mode .card .card-delete-btn { display:none; }


  /* Checkbox in delete mode */
  .card-checkbox { position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:5px; border:2px solid white; background:rgba(0,0,0,0.3); display:none; align-items:center; justify-content:center; z-index:10; pointer-events:none; }
  .card-checkbox.checked { background:#c23030; border-color:#c23030; }
  .card-checkbox.checked::after { content:'✓'; color:white; font-size:11px; font-weight:700; }
  .delete-mode .card .card-checkbox { display:flex; }

  .card-body { padding:12px 14px 14px; flex:1; display:flex; flex-direction:column; }
  .card-cat-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .card-title { font-size:14px; font-weight:500; color:var(--text-primary); margin-bottom:5px; line-height:1.3; }
  .card-desc { font-size:11px; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; flex:1; }
  .card-footer { margin-top:10px; display:flex; align-items:center; justify-content:space-between; }
  .card-note-dot { width:6px; height:6px; border-radius:50%; background:#1D9E75; }
  .card-date { font-size:10px; color:var(--text-tertiary); }

  /* Empty / loading */
  .empty-state { text-align:center; padding:80px 20px; color:var(--text-secondary); }
  .empty-icon { font-size:40px; margin-bottom:14px; }
  .empty-state h3 { font-size:17px; font-weight:500; color:var(--text-primary); margin-bottom:8px; }
  .empty-state p { font-size:14px; line-height:1.6; max-width:300px; margin:0 auto; }
  .loading-card { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-lg); overflow:hidden; animation:pulse 1.2s ease-in-out infinite; }
  .loading-card .img-skel { height:130px; background:var(--bg-secondary); }
  .loading-card .body-skel { padding:12px 14px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
  .skel { background:var(--bg-secondary); border-radius:4px; height:12px; margin-bottom:8px; }
  .skel.h16{height:16px;} .skel.w80{width:80%;} .skel.w60{width:60%;} .skel.w40{width:40%;}

  /* Overlay */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }

  /* Detail panel */
  .detail-panel { background:var(--bg-primary); border:0.5px solid var(--border-mid); border-radius:var(--radius-xl); width:100%; max-width:620px; max-height:90vh; overflow-y:auto; position:relative; }
  .detail-hero { width:100%; height:220px; overflow:hidden; position:relative; background:var(--bg-secondary); border-radius:var(--radius-xl) var(--radius-xl) 0 0; }
  .detail-hero img { width:100%; height:100%; object-fit:cover; display:block; }
  .detail-hero-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:60px; }
  .detail-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 60%); }
  .detail-hero-badge { position:absolute; top:14px; left:16px; display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; backdrop-filter:blur(4px); }
  .detail-hero-close { position:absolute; top:12px; right:14px; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,0.45); border:none; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:white; }
  .detail-hero-close:hover { background:rgba(0,0,0,0.65); }
  .detail-hero-title { position:absolute; bottom:14px; left:16px; right:16px; font-size:22px; font-weight:500; color:white; line-height:1.2; text-shadow:0 1px 4px rgba(0,0,0,0.4); }
  .detail-header { padding:18px 22px 14px; }
  .detail-title-fallback { font-size:24px; font-weight:500; color:var(--text-primary); margin-bottom:10px; line-height:1.2; }
  .detail-top-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .detail-close-fallback { width:28px; height:28px; border-radius:50%; background:var(--bg-secondary); border:0.5px solid var(--border-light); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); }
  .detail-cat-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; }
  .detail-desc { font-size:14px; color:var(--text-secondary); line-height:1.7; }
  .detail-section { padding:16px 22px; border-top:0.5px solid var(--border-light); }
  .detail-section-title { font-size:10px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
  .change-cat-row { display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .change-cat-label { font-size:11px; color:var(--text-tertiary); }
  .change-cat-select { font-size:12px; padding:4px 8px; border:0.5px solid var(--border-mid); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text-primary); font-family:var(--font); outline:none; cursor:pointer; }
  .change-cat-btn { padding:4px 10px; font-size:12px; font-weight:500; border:0.5px solid var(--border-mid); background:var(--bg-secondary); color:var(--text-primary); border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); transition:background 0.15s; }
  .change-cat-btn:hover { background:var(--bg-tertiary); }
  .facts-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .fact-item { background:var(--bg-secondary); border-radius:var(--radius-md); padding:9px 11px; }
  .fact-label { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:3px; }
  .fact-value { font-size:13px; color:var(--text-primary); font-weight:500; }
  .my-notes { width:100%; min-height:80px; border:0.5px solid var(--border-mid); border-radius:var(--radius-md); padding:10px 12px; font-size:13px; color:var(--text-primary); background:var(--bg-secondary); resize:vertical; font-family:var(--font); line-height:1.6; }
  .my-notes:focus { outline:none; border-color:var(--border-strong); }
  .my-notes::placeholder { color:var(--text-tertiary); }
  .notes-actions { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .save-btn { padding:6px 15px; font-size:12px; font-weight:500; border:0.5px solid var(--border-mid); background:var(--bg-secondary); color:var(--text-primary); border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); transition:background 0.15s; }
  .save-btn:hover { background:var(--bg-tertiary); }
  .saved-msg { font-size:12px; color:#1D9E75; opacity:0; transition:opacity 0.3s; }
  .saved-msg.show { opacity:1; }
  .related-chips { display:flex; flex-wrap:wrap; gap:8px; }
  .related-chip { padding:6px 13px; font-size:12px; border:0.5px solid var(--border-mid); border-radius:20px; cursor:pointer; color:var(--text-secondary); background:var(--bg-secondary); transition:all 0.12s; font-family:var(--font); }
  .related-chip:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--bg-primary); }
  .chat-section { border-top:0.5px solid var(--border-light); padding:0 22px 20px; }
  .chat-section-header { display:flex; align-items:center; gap:8px; padding:14px 0 12px; }
  .chat-section-title { font-size:10px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.8px; }
  .chat-clear-btn { margin-left:auto; font-size:11px; color:var(--text-tertiary); cursor:pointer; border:none; background:none; font-family:var(--font); padding:2px 6px; border-radius:4px; }
  .chat-clear-btn:hover { color:var(--text-secondary); background:var(--bg-secondary); }
  .chat-messages { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; max-height:280px; overflow-y:auto; padding-right:2px; scroll-behavior:smooth; }
  .chat-bubble { display:flex; flex-direction:column; }
  .bubble-user { align-items:flex-end; }
  .bubble-ai { align-items:flex-start; }
  .bubble-text { max-width:88%; padding:9px 13px; border-radius:14px; font-size:13px; line-height:1.65; white-space:pre-wrap; word-break:break-word; }
  .bubble-user .bubble-text { background:var(--text-primary); color:var(--bg-primary); border-bottom-right-radius:4px; }
  .bubble-ai .bubble-text { background:var(--bg-secondary); color:var(--text-primary); border-bottom-left-radius:4px; border:0.5px solid var(--border-light); }
  .chat-thinking { display:flex; align-items:center; gap:5px; padding:10px 14px; background:var(--bg-secondary); border:0.5px solid var(--border-light); border-radius:14px; border-bottom-left-radius:4px; width:fit-content; }
  .dot { width:5px; height:5px; border-radius:50%; background:var(--text-tertiary); animation:bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:0.2s;} .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  .chat-suggestions { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .chat-suggestion { padding:5px 12px; font-size:12px; border:0.5px solid var(--border-mid); border-radius:20px; cursor:pointer; color:var(--text-secondary); background:var(--bg-secondary); transition:all 0.12s; font-family:var(--font); }
  .chat-suggestion:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--bg-primary); }
  .chat-input-row { display:flex; gap:8px; align-items:flex-end; }
  .chat-input { flex:1; padding:9px 13px; border:0.5px solid var(--border-mid); border-radius:var(--radius-lg); font-size:13px; color:var(--text-primary); background:var(--bg-secondary); font-family:var(--font); outline:none; resize:none; line-height:1.5; min-height:38px; max-height:100px; overflow-y:auto; }
  .chat-input:focus { border-color:var(--border-strong); background:var(--bg-primary); }
  .chat-input::placeholder { color:var(--text-tertiary); }
  .chat-send-btn { padding:8px 15px; font-size:12px; font-weight:500; background:var(--text-primary); color:var(--bg-primary); border:none; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); white-space:nowrap; flex-shrink:0; transition:opacity 0.15s; height:38px; }
  .chat-send-btn:hover { opacity:0.82; }
  .chat-send-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .detail-footer { padding:12px 22px; border-top:0.5px solid var(--border-light); display:flex; justify-content:flex-end; }
  .delete-btn { padding:6px 15px; font-size:12px; font-weight:500; border:0.5px solid rgba(194,48,48,0.3); background:rgba(194,48,48,0.06); color:#c23030; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); transition:background 0.15s; }
  .delete-btn:hover { background:rgba(194,48,48,0.12); }

  /* ── Duplicate warning modal ── */
  .dup-modal { background:var(--bg-primary); border:0.5px solid var(--border-mid); border-radius:var(--radius-xl); width:100%; max-width:520px; overflow:hidden; }
  .dup-modal-header { padding:20px 22px 14px; border-bottom:0.5px solid var(--border-light); }
  .dup-modal-title { font-size:16px; font-weight:500; color:var(--text-primary); margin-bottom:4px; }
  .dup-modal-sub { font-size:13px; color:var(--text-secondary); line-height:1.5; }
  .dup-existing-card { display:flex; gap:14px; align-items:flex-start; padding:16px 22px; background:var(--bg-secondary); border-bottom:0.5px solid var(--border-light); }
  .dup-existing-img { width:64px; height:64px; border-radius:var(--radius-md); overflow:hidden; flex-shrink:0; background:var(--bg-tertiary); display:flex; align-items:center; justify-content:center; font-size:26px; }
  .dup-existing-img img { width:100%; height:100%; object-fit:cover; object-position:center top; }
  .dup-existing-info { flex:1; min-width:0; }
  .dup-existing-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .dup-existing-title { font-size:15px; font-weight:500; color:var(--text-primary); margin-bottom:4px; }
  .dup-existing-desc { font-size:12px; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dup-existing-date { font-size:11px; color:var(--text-tertiary); margin-top:5px; }
  .dup-modal-actions { padding:16px 22px; display:flex; gap:10px; flex-wrap:wrap; }
  .dup-btn { padding:8px 16px; font-size:13px; font-weight:500; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font); transition:all 0.15s; }
  .dup-btn.view { background:var(--bg-secondary); color:var(--text-primary); border:0.5px solid var(--border-mid); }
  .dup-btn.view:hover { background:var(--bg-tertiary); }
  .dup-btn.proceed { background:var(--text-primary); color:var(--bg-primary); border:none; }
  .dup-btn.proceed:hover { opacity:0.85; }
  .dup-btn.cancel { background:transparent; color:var(--text-secondary); border:none; }
  .dup-btn.cancel:hover { color:var(--text-primary); }

  /* Category modal */
  .modal-panel { background:var(--bg-primary); border:0.5px solid var(--border-mid); border-radius:var(--radius-xl); width:100%; max-width:480px; max-height:85vh; overflow-y:auto; }
  .modal-header { padding:20px 22px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:0.5px solid var(--border-light); }
  .modal-title { font-size:16px; font-weight:500; color:var(--text-primary); }
  .modal-close { width:28px; height:28px; border-radius:50%; background:var(--bg-secondary); border:0.5px solid var(--border-light); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); }
  .modal-body { padding:16px 22px; }
  .modal-section-label { font-size:10px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
  .cat-list { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
  .cat-row { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--bg-secondary); border-radius:var(--radius-md); }
  .cat-row-emoji { font-size:16px; width:24px; text-align:center; }
  .cat-row-name { flex:1; font-size:13px; font-weight:500; color:var(--text-primary); }
  .cat-row-count { font-size:11px; color:var(--text-tertiary); }
  .cat-row-actions { display:flex; gap:6px; }

<script>
const PALETTE = [

};

const PERSON_CATS = new Set(['Music','Celebrity','Politics','Sports','Art']);

const CHAT_SUGGESTIONS = {
  Movie:['What\'s the plot?','Who are the lead actors?','Won any awards?','Similar movies?'],
  'TV Show':['How many seasons?','What\'s it about?','Still airing?','Similar shows?'],
  Music:['Most popular albums?','What genre?','Career highlights?','Similar artists?'],
  Travel:['Best time to visit?','What to eat there?','Top attractions?','Visa requirements?'],
  Restaurant:['Famous dishes?','Price range?','Where are locations?','Reservation needed?'],
  Celebrity:['Career highlights?','Recent projects?','Awards won?','Personal background?'],
  Politics:['Key policies?','Current role?','Political background?','Major achievements?'],
  Economics:['Simple explanation?','Real world examples?','Who coined this?','Current relevance?'],
  Sports:['Career stats?','Major titles?','Playing style?','Biggest rivals?'],
  Tech:['How does it work?','Who created it?','Main use cases?','Competitors?'],
  Art:['Art style?','Famous works?','Time period?','Influences?'],
  Book:['What\'s it about?','Author background?','Awards won?','Similar books?'],
  Other:['Simple explanation?','Why important?','Recent developments?','Related concepts?'],
};

/* ── Storage migration ── */
function migrateStorage() {
  if (localStorage.getItem('concept_db_unified')) return;
  for (const k of ['concept_db_v2','concept_db_v1','concept_db']) {
    const val = localStorage.getItem(k);
    if (val) { try { if (JSON.parse(val).length>0) { localStorage.setItem('concept_db_unified',val); break; } } catch(e){} }
  }
}
migrateStorage();

/* ── State ── */
let db            = JSON.parse(localStorage.getItem('concept_db_unified')||'[]');
let notes         = JSON.parse(localStorage.getItem('concept_notes_v1')||'{}');
let chatHistories = JSON.parse(localStorage.getItem('concept_chats_v1')||'{}');
let customCats    = JSON.parse(localStorage.getItem('concept_custom_cats')||'{}');
let apiKey        = localStorage.getItem('concept_api_key')||'';
let currentTab    = 'All';
let searchQ       = '';
let detailOpen    = null;
let isGenerating  = false;
let isChatting    = false;
let deleteMode    = false;
let selectedIds   = new Set();
let newCatColor   = 0;
let pendingCard   = null; // card awaiting duplicate confirmation

function saveDB()           { localStorage.setItem('concept_db_unified', JSON.stringify(db)); }
function saveNotes()        { localStorage.setItem('concept_notes_v1',   JSON.stringify(notes)); }
function saveChatHistories(){ localStorage.setItem('concept_chats_v1',   JSON.stringify(chatHistories)); }
function saveCustomCats()   { localStorage.setItem('concept_custom_cats',JSON.stringify(customCats)); }

function getCatConfig() { return Object.assign({},DEFAULT_CATS,customCats); }
function getCfg(cat)    { return getCatConfig()[cat] || getCatConfig().Other; }

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val; localStorage.setItem('concept_api_key',apiKey);
  document.getElementById('api-banner').classList.add('hidden');
}
function checkApiKey() {
  document.getElementById('api-banner').classList[apiKey?'add':'remove']('hidden');
}

/* ── Image fetching — Wikipedia only ── */
function isPersonCategory(cat) { return PERSON_CATS.has(cat)||(customCats[cat]&&customCats[cat].isPerson); }

// Fetch image from a specific Wikipedia article title
async function fetchWikiImage(wikiTitle, preferFace) {
  try {
    const size = preferFace ? 400 : 600;
    const url  = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=${size}&origin=*`;
    const resp = await fetch(url);
    const data = await resp.json();
    const pages = data.query.pages;
    const page  = pages[Object.keys(pages)[0]];
    return (page && page.thumbnail) ? page.thumbnail.source : null;
  } catch(e) { return null; }
}

// Build smart Wikipedia search queries from card content
function buildWikiQueries(card) {
  const title    = card.title || '';
  const category = (card.category || '').toLowerCase();
  const facts    = card.facts || [];
  const isPerson = card.isPerson || isPersonCategory(card.category);

  const factMap = {};
  facts.forEach(f => { factMap[(f.label||'').toLowerCase()] = f.value||''; });
  const year   = factMap['year'] || factMap['years'] || '';
  const genre  = factMap['genre'] || '';
  const origin = factMap['origin'] || factMap['country'] || factMap['nationality'] || '';

  const queries = [];

  if (isPerson) {
    queries.push(title);
    if (genre)  queries.push(`${title} ${genre}`);
    if (origin) queries.push(`${title} ${origin}`);
  } else if (category === 'movie') {
    queries.push(`${title} film`);
    if (year) queries.push(`${title} ${year} film`);
    queries.push(title);
  } else if (category === 'tv show') {
    queries.push(`${title} TV series`);
    queries.push(`${title} series`);
    queries.push(title);
  } else if (category === 'book') {
    queries.push(`${title} novel`);
    queries.push(title);
  } else if (category === 'restaurant') {
    queries.push(`${title} restaurant`);
    queries.push(title);
  } else {
    queries.push(title);
    if (origin) queries.push(`${title} ${origin}`);
    if (genre)  queries.push(`${title} ${genre}`);
  }

  return queries;
}

// Check if a Wikipedia image URL looks like a movie/show poster (not a person photo)
function isPosterLikeImage(url) {
  if (!url) return false;
  const lower = url.toLowerCase();
  // Posters are usually portrait-oriented and contain keywords like "poster", "cover", "dvd", "blu"
  return lower.includes('poster') || lower.includes('cover') || lower.includes('dvd')
      || lower.includes('blu-ray') || lower.includes('film') || lower.includes('logo');
}

// For movies/shows: search Wikipedia, but skip images that look like person photos
// Wikipedia article images for films are usually the poster; we want to avoid cast/director pages
async function fetchFilmImage(card) {
  const title = card.title || '';
  const category = (card.category || '').toLowerCase();
  const factMap = {};
  (card.facts||[]).forEach(f => { factMap[(f.label||'').toLowerCase()] = f.value||''; });
  const year = factMap['year'] || factMap['years'] || '';

  // Build queries that target the film/show article specifically, not cast pages
  const queries = category === 'movie'
    ? [`${title} film`, year ? `${title} ${year} film` : null, `${title} movie`].filter(Boolean)
    : [`${title} TV series`, `${title} series`, `${title} television`];

  for (const q of queries) {
    // Try exact article match first
    const img = await fetchWikiImage(q, false);
    if (img) return img;

    // Try search but only accept the first result whose title closely matches the show/film
    // (avoids picking a cast member's page)
    try {
      const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=5`;
      const sr   = await fetch(searchUrl);
      const sd   = await sr.json();
      const hits = sd.query && sd.query.search;
      if (!hits) continue;
      for (const hit of hits) {
        const htl = hit.title.toLowerCase();
        // Only consider articles whose title contains the show/film name
        // and looks like a film/series article, not a person or character
        const titleWords = title.toLowerCase().split(' ').filter(w=>w.length>2);
        const titleMatch = titleWords.some(w => htl.includes(w));
        const looksLikeFilm = htl.includes('film') || htl.includes('series') || htl.includes('tv')
                           || htl.includes(title.toLowerCase().split(' ')[0]);
        if (!titleMatch && !looksLikeFilm) continue;

        const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(hit.title)}&prop=pageimages&format=json&pithumbsize=600&origin=*`;
        const ir = await fetch(imgUrl);
        const id = await ir.json();
        const pages = id.query.pages;
        const page  = pages[Object.keys(pages)[0]];
        if (page && page.thumbnail) return page.thumbnail.source;
      }
    } catch(e) {}
  }
  return null;
}

// Main: fetch best Wikipedia image using card content
async function fetchBestImage(card) {
  if (!card) return null;
  const category = (card.category || '').toLowerCase();
  const isPerson = card.isPerson || isPersonCategory(card.category);

  // Movies and TV shows: use film-specific search to get posters, not cast photos
  if (category === 'movie' || category === 'tv show') {
    const img = await fetchFilmImage(card);
    if (img) return img;
  }

  // Everything else: standard search
  const queries = buildWikiQueries(card);

  // 1. Try each query as an exact Wikipedia article title
  for (const q of queries) {
    const img = await fetchWikiImage(q, isPerson);
    if (img) return img;
  }

  // 2. Fall back to Wikipedia full-text search
  for (const q of queries) {
    try {
      const size = isPerson ? 400 : 600;
      const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=3`;
      const sr   = await fetch(searchUrl);
      const sd   = await sr.json();
      const hits = sd.query && sd.query.search;
      if (!hits || hits.length === 0) continue;
      for (const hit of hits) {
        const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(hit.title)}&prop=pageimages&format=json&pithumbsize=${size}&origin=*`;
        const ir = await fetch(imgUrl);
        const id = await ir.json();
        const pages = id.query.pages;
        const page  = pages[Object.keys(pages)[0]];
        if (page && page.thumbnail) return page.thumbnail.source;
      }
    } catch(e) {}
  }

  return null;
}

/* ── Duplicate detection ── */
function normTitle(t) {
  return t.toLowerCase().replace(/[^a-z0-9]/g,'');
}
function findDuplicate(title) {
  const n = normTitle(title);
  if (!n) return null;
  return db.find(c => {
    const cn = normTitle(c.title);
    return cn === n || (cn.length > 3 && n.length > 3 && (cn.includes(n) || n.includes(cn)));
  });
}

/* ── Delete mode ── */
function toggleDeleteMode() {
  deleteMode = !deleteMode;
  selectedIds.clear();
  const btn = document.getElementById('delete-mode-btn');
  const bar = document.getElementById('delete-mode-bar');
  const grid= document.getElementById('main-content');
  if (deleteMode) {
    btn.textContent = '✕ Exit select';
    btn.classList.add('danger');
    bar.classList.remove('hidden');
    grid.classList.add('delete-mode');
  } else {
    btn.textContent = '🗑 Select';
    btn.classList.remove('danger');
    bar.classList.add('hidden');
    grid.classList.remove('delete-mode');
  }
  updateDeleteBar();
  renderMain();
}

function updateDeleteBar() {
  const count = selectedIds.size;
  document.getElementById('delete-mode-count').textContent = count === 1 ? '1 selected' : `${count} selected`;
  document.getElementById('delete-confirm-btn').disabled = count === 0;
}

function toggleCardSelect(id, e) {
  e.stopPropagation();
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateDeleteBar();
  // Toggle visual without full re-render
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (cardEl) {
    cardEl.classList.toggle('selected', selectedIds.has(id));
    const cb = cardEl.querySelector('.card-checkbox');
    if (cb) cb.classList.toggle('checked', selectedIds.has(id));
  }
}

function quickDeleteCard(id, e) {
  e.stopPropagation();
  if (!confirm('Remove this card?')) return;
  db = db.filter(c=>c.id!==id);
  delete notes[id]; delete chatHistories[id];
  saveDB(); saveNotes(); saveChatHistories();
  if (!getActiveCategories().includes(currentTab)) currentTab='All';
  renderAll();
}

function deleteSelected() {
  if (selectedIds.size===0) return;
  if (!confirm(`Delete ${selectedIds.size} card${selectedIds.size>1?'s':''}? This cannot be undone.`)) return;
  selectedIds.forEach(id => { delete notes[id]; delete chatHistories[id]; });
  db = db.filter(c=>!selectedIds.has(c.id));
  saveDB(); saveNotes(); saveChatHistories();
  selectedIds.clear();
  if (!getActiveCategories().includes(currentTab)) currentTab='All';
  toggleDeleteMode();
}

/* ── Nav ── */
function getActiveCategories() {
  const used=new Set(db.map(c=>c.category));
  return ['All',...Object.keys(getCatConfig()).filter(c=>used.has(c))];
}

function renderNav() {
  document.getElementById('nav-tabs').innerHTML = getActiveCategories().map(c=>{
    const count=c==='All'?db.length:db.filter(x=>x.category===c).length;
    return `<div class="nav-tab ${currentTab===c?'active':''}" onclick="switchTab('${c}')">${c} <span style="font-size:11px;opacity:0.45">${count}</span></div>`;
  }).join('');
}

function switchTab(cat) {
  currentTab=cat; searchQ='';
  const si=document.getElementById('search-input');
  if(si) si.value='';
  renderAll();
}

function getFiltered() {
  let cards=currentTab==='All'?db:db.filter(c=>c.category===currentTab);
  if (searchQ) { const q=searchQ.toLowerCase(); cards=cards.filter(c=>c.title.toLowerCase().includes(q)||c.description.toLowerCase().includes(q)); }
  return cards;
}

function renderAll() { renderNav(); renderMain(); }

function renderCardsOnly() { renderMain(); }


/* ── Main grid ── */
function renderMain() {
  const el=document.getElementById('main-content');
  const filtered=getFiltered();
  // Update search placeholder only (never rebuild the input itself)
  const si = document.getElementById('search-input');
  if (si) si.placeholder = currentTab==='All' ? 'Search all cards...' : `Search in ${currentTab}...`;
  let html='';

  if (filtered.length===0&&!isGenerating) {
    html+=`<div class="empty-state"><div class="empty-icon">${currentTab==='All'?'✦':'📂'}</div>
      <h3>${currentTab==='All'?'Your library is empty':'No '+currentTab+' cards yet'}</h3>
      <p>${currentTab==='All'?'Type any concept above and hit Generate.':'Add cards using the input at the top.'}</p></div>`;
  } else {
    html+=`<div class="cards-grid ${deleteMode?'delete-mode':''}">`;
    filtered.forEach(card=>{
      const cfg=getCfg(card.category);
      const hasNote=notes[card.id]&&notes[card.id].trim();
      const isPerson=isPersonCategory(card.category);
      const catL=(card.category||'').toLowerCase();
      const imgPos=(isPerson&&catL!=='movie'&&catL!=='tv show')?'center top':'center center';
      const imgHtml=card.imageUrl?`<img src="${escHtml(card.imageUrl)}" alt="${escHtml(card.title)}" loading="lazy" style="object-position:${imgPos}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
      const phStyle=card.imageUrl?'style="display:none"':'';
      const isSelected=selectedIds.has(card.id);

      html+=`<div class="card ${isSelected?'selected':''}" data-id="${card.id}" onclick="${deleteMode?`toggleCardSelect('${card.id}',event)`:`openDetail('${card.id}')`}">
        <div class="card-img-wrap">
          ${imgHtml}
          <div class="img-placeholder" ${phStyle}>${cfg.emoji}</div>
          <div class="card-img-accent" style="background:${cfg.accent}"></div>
          <button class="card-delete-btn" onclick="quickDeleteCard('${card.id}',event)" title="Delete card">✕</button>
          <div class="card-checkbox ${isSelected?'checked':''}"></div>
        </div>
        <div class="card-body">
          <div class="card-cat-badge" style="background:${cfg.bg};color:${cfg.text}">${cfg.emoji} ${card.category}</div>
          <div class="card-title">${escHtml(card.title)}</div>
          <div class="card-desc">${escHtml(card.description)}</div>

/* ── Card generation ── */
async function generate(name) {
  if (!name.trim()||isGenerating) return;
  if (!apiKey) { document.getElementById('api-banner').classList.remove('hidden'); document.getElementById('api-key-input').focus(); return; }

  // Check IMMEDIATELY before any API call — instant, no cost
  const earlyDup = findDuplicate(name);
  if (earlyDup) {
    pendingCard = { _rawName: name };
    showDuplicateModal(earlyDup, null);
    return;
  }

  await doGenerate(name);
}

async function doGenerate(name) {
  isGenerating=true;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.textContent='...';
  renderMain();

  try {
    const allCatNames=Object.keys(getCatConfig()).join(', ');
    // We'll fetch the best image after we know the title/category from the API
    const firstImg = null;
    const [resp]=await Promise.all([
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1500,
          tools:[{"type":"web_search_20250305","name":"web_search"}],
          system:`You are a research assistant creating accurate concept cards. You MUST use web_search to find verified information before writing anything. Never invent or guess facts, dates, names, or figures. If a fact cannot be verified from search results, write "Unknown" instead of guessing. IMPORTANT: Never include citation tags, reference markers, <cite> tags, footnotes, or source annotations of any kind in your output. Write clean plain text only.`,
          messages:[{role:'user',content:`Search the web for accurate, up-to-date information about: "${name}"

Then return ONLY a valid JSON object (no markdown fences, no extra text). Use ONLY facts you found and verified from your search — do not add anything not confirmed by search results:
{
  "title": "canonical name or title as it appears in search results",
  "category": "pick the single best match from: ${allCatNames}",
  "description": "2-3 sentences using only verified facts from search. No speculation.",
  "facts": [{"label":"...","value":"..."}] (3-4 key verified facts only — e.g. year, genre, origin, known for — write Unknown if not found),
  "related": ["name1","name2","name3","name4","name5"] (verified related concepts from search),
  "isPerson": true or false,
  "wikiTitle": "exact Wikipedia article title for image lookup"
}`}]
        })
      }),
    ]);

    if (!resp.ok) { const e=await resp.json(); throw new Error(e.error?.message||resp.statusText); }
    const data=await resp.json();
    // Extract only text blocks (skip tool_use and tool_result blocks)
    const rawText = data.content.filter(b=>b.type==='text').map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    if (!rawText) throw new Error('No card content returned. The topic may not have enough verified information.');
    const parsed=JSON.parse(rawText);
    // Strip any citation tags like <cite index="...">...</cite> from all string fields
    function stripCites(obj) {
      if (typeof obj === 'string') return obj.replace(/<cite[^>]*>|<\/cite>/g,'').trim();
      if (Array.isArray(obj)) return obj.map(stripCites);
      if (obj && typeof obj === 'object') {
        const out = {};
        for (const k in obj) out[k] = stripCites(obj[k]);
        return out;
      }
      return obj;
    }
    const clean = stripCites(parsed);
    Object.assign(parsed, clean);

    const isPerson=parsed.isPerson===true||isPersonCategory(parsed.category||'');

    // Build a full card object first so fetchBestImage can use all content
    const card={
      id:Date.now().toString(),
      title:parsed.title||name,
      category:parsed.category||'Other',
      description:parsed.description||'',
      facts:parsed.facts||[],
      related:parsed.related||[],
      isPerson,
      imageUrl:null,
      date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    };

    // Fetch image using full card content for smarter matching
    card.imageUrl = await fetchBestImage(card) || null;

    db.unshift(card); saveDB();
    if (currentTab!=='All'&&currentTab!==card.category) currentTab='All';
    detailOpen=card.id;

  } catch(e) { alert('Error: '+e.message); console.error(e); }

  isGenerating=false;
  btn.disabled=false; btn.textContent='Generate';
  document.getElementById('main-input').value='';
  renderAll();
}

function openDetail(id) {
  detailOpen=id;
  renderDetail();
  // If card has no image, fetch one now and update when it arrives
  const card = db.find(c=>c.id===id);
  if (card && !card.imageUrl) {
    fetchBestImage(card)
      .then(img => {
        if (img) {
          card.imageUrl = img;
          saveDB();
          // Update the grid card image silently
          const cardEl = document.querySelector(`.card[data-id="${id}"]`);
          if (cardEl) {
            const wrap = cardEl.querySelector('.card-img-wrap');
            const placeholder = wrap && wrap.querySelector('.img-placeholder');
            if (wrap && !wrap.querySelector('img')) {
              const newImg = document.createElement('img');
              newImg.src = img;
              newImg.alt = card.title;
              newImg.style.objectPosition = isPerson ? 'center top' : 'center center';
              newImg.onerror = function(){ this.style.display='none'; if(placeholder) placeholder.style.display='flex'; };
              wrap.insertBefore(newImg, wrap.firstChild);
              if (placeholder) placeholder.style.display='none';
            }
          }
          // Re-render detail panel to show the hero image
          if (detailOpen === id) renderDetail();
        }
      })
      .catch(()=>{});
  }
}

/* ── AI Chat ── */
async function sendChat(cardId) {
  if (isChatting) return;
  const input=document.getElementById('chat-input');
  const sendBtn=document.getElementById('chat-send-btn');
  const question=input?input.value.trim():'';
  if (!question) return;
  if (!apiKey) { document.getElementById('api-banner').classList.remove('hidden'); return; }
  const card=db.find(c=>c.id===cardId);
  if (!card) return;

  isChatting=true;
  if (input) { input.value=''; input.style.height='auto'; }
  if (sendBtn) { sendBtn.disabled=true; sendBtn.textContent='...'; }

  if (!chatHistories[cardId]) chatHistories[cardId]=[];
  chatHistories[cardId].push({role:'user',content:question});

  const msgs=document.getElementById('chat-messages');
  if (msgs) {
    document.getElementById('chat-suggestions')?.remove();
    const ub=document.createElement('div');
    ub.className='chat-bubble bubble-user';
    ub.innerHTML=`<div class="bubble-text">${escHtml(question)}</div>`;
    msgs.appendChild(ub);
    const tb=document.createElement('div');
    tb.className='chat-bubble bubble-ai'; tb.id='thinking-bubble';
    tb.innerHTML=`<div class="chat-thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    msgs.appendChild(tb);
    msgs.scrollTop=msgs.scrollHeight;
  }

  try {
    const sys=`You are a knowledgeable assistant helping a user learn about "${card.title}" (${card.category}). Description: ${card.description}. Facts: ${(card.facts||[]).map(f=>f.label+': '+f.value).join(', ')}. Be concise (2-4 sentences), conversational, and engaging.`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:chatHistories[cardId].map(m=>({role:m.role,content:m.content}))})
    });
    if (!resp.ok) { const e=await resp.json(); throw new Error(e.error?.message||resp.statusText); }
    const data=await resp.json();
    const answer=data.content.map(b=>b.text||'').join('').trim();
    chatHistories[cardId].push({role:'assistant',content:answer});
    saveChatHistories();
    const tb=document.getElementById('thinking-bubble');
    if (tb) { tb.innerHTML=`<div class="bubble-text">${escHtml(answer)}</div>`; tb.id=''; }
    if (msgs) msgs.scrollTop=msgs.scrollHeight;
  } catch(e) {
    const tb=document.getElementById('thinking-bubble');
    if (tb) { tb.innerHTML=`<div class="bubble-text" style="color:#c23030">Error: ${escHtml(e.message)}</div>`; tb.id=''; }
    chatHistories[cardId].pop();
    console.error(e);
  }

  isChatting=false;
  if (sendBtn) { sendBtn.disabled=false; sendBtn.textContent='Ask ↗'; }
  document.getElementById('chat-input')?.focus();
}

function deleteCat(name) {

  closeCatModal();

function confirmEditCat(oldName) {
  const input=document.getElementById('cat-edit-input');
  const newName=input?input.value.trim():oldName;
  if (!newName||newName===oldName) { closeCatModal(); openCatModal(); return; }
  if (getCatConfig()[newName]&&newName!==oldName) { alert('That name already exists.'); return; }
  const cfg=getCatConfig()[oldName];
  if (customCats[oldName]) { customCats[newName]=customCats[oldName]; delete customCats[oldName]; }
  else { customCats[newName]={...cfg,builtin:false}; }
  db.forEach(c=>{ if(c.category===oldName) c.category=newName; });
  if (PERSON_CATS.has(oldName)) { PERSON_CATS.delete(oldName); PERSON_CATS.add(newName); }
  saveDB(); saveCustomCats();
  if (currentTab===oldName) currentTab=newName;
  closeCatModal(); renderAll(); openCatModal();
}

/* ── Auto-fetch missing images silently on load ── */
async function autoFetchMissingImages() {
  const missing = db.filter(c => !c.imageUrl);
  if (missing.length === 0) return;

  for (const card of missing) {
    try {
      const isPerson = card.isPerson || isPersonCategory(card.category);
      let img = null;

      img = await fetchBestImage(card);

      if (img) {
        card.imageUrl = img;
        saveDB();
        // Update just this card's image in the DOM without re-rendering everything
        const cardEl = document.querySelector(`.card[data-id="${card.id}"]`);
        if (cardEl) {
          const wrap = cardEl.querySelector('.card-img-wrap');
          const placeholder = wrap ? wrap.querySelector('.img-placeholder') : null;
          const existingImg = wrap ? wrap.querySelector('img') : null;
          if (wrap && !existingImg) {
            const imgPos = isPerson ? 'center top' : 'center center';
            const newImg = document.createElement('img');
            newImg.src = img;
            newImg.alt = card.title;
            newImg.loading = 'lazy';
            newImg.style.objectPosition = imgPos;
            newImg.onerror = function() { this.style.display='none'; if(placeholder) placeholder.style.display='flex'; };
            wrap.insertBefore(newImg, wrap.firstChild);
            if (placeholder) placeholder.style.display = 'none';
          }
        }
      }
    } catch(e) { console.error('img fetch error', card.title, e); }
  }
}

/* ── Fetch photo for a single card ── */
async function fetchPhotoForCard(cardId, e) {
  e.stopPropagation();
  const card = db.find(c => c.id === cardId);
  if (!card) return;

  const btn = e.target;
  btn.textContent = '⏳';
  btn.classList.add('loading');

  try {
    let img = await fetchBestImage(card);

    if (img) {
      card.imageUrl = img;
      saveDB();
      // Re-render just this card in the grid
      const cardEl = document.querySelector(`.card[data-id="${cardId}"]`);
      if (cardEl) {
        const wrap = cardEl.querySelector('.card-img-wrap');
        const placeholder = wrap && wrap.querySelector('.img-placeholder');
        const fetchBtn = wrap && wrap.querySelector('.card-fetch-photo-btn');
        if (wrap && !wrap.querySelector('img')) {
          const newImg = document.createElement('img');
          newImg.src = img;
          newImg.alt = card.title;
          newImg.style.objectPosition = isPerson ? 'center top' : 'center center';
          newImg.onerror = function(){ this.style.display='none'; if(placeholder) placeholder.style.display='flex'; };
          wrap.insertBefore(newImg, wrap.firstChild);
          if (placeholder) placeholder.style.display = 'none';
          if (fetchBtn) fetchBtn.remove();
        }
      }
    } else {
      btn.textContent = '📷 Get photo';
      btn.classList.remove('loading');
      alert('Could not find a photo for this card. Try editing the title to be more specific.');
    }
  } catch(err) {
    btn.textContent = '📷 Get photo';
    btn.classList.remove('loading');
    console.error(err);
  }
}

/* ── Listeners ── */
document.getElementById('gen-btn').addEventListener('click',()=>generate(document.getElementById('main-input').value.trim()));
document.getElementById('main-input').addEventListener('keydown',e=>{ if(e.key==='Enter') generate(e.target.value.trim()); });
document.getElementById('api-key-input').addEventListener('keydown',e=>{ if(e.key==='Enter') saveApiKey(); });

checkApiKey();
renderAll();
// Silently fetch images for any cards that don't have one yet
autoFetchMissingImages();
</script>
